<!DOCTYPE html>
<html lang="en" translate="no">

<head>
  <meta charset="UTF-8" />
  <!-- Anti-translation: Google -->
  <meta name="google" content="notranslate" />
  <!-- Anti-translation: Microsoft Translator / Edge -->
  <meta name="microsoft-translate" content="no" />
  <!-- Anti-translation: Yandex Browser -->
  <meta name="yandex" content="noindex,notranslate" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <title>Hekayaty - حكاياتي | Every Writer Deserves a World</title>
  <meta name="description"
    content="Build your own digital bookstore, connect with readers, and sell your stories directly. The universe for storytellers and worldbuilders." />

  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Hekayaty - حكاياتي | Every Writer Deserves a World" />
  <meta property="og:description"
    content="The ultimate universe for storytellers. Publish, sell, and manage your stories directly." />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:site_name" content="Hekayaty" />

  <!-- Resource Hints -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://res.cloudinary.com">
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://res.cloudinary.com">

  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&family=Merriweather:ital,wght@0,300..900;1,300..900&family=Cairo:wght@200..1000&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&display=swap" as="style">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&family=Merriweather:ital,wght@0,300..900;1,300..900&family=Cairo:wght@200..1000&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&display=swap">

  <!-- Anti-auto-translate runtime guard -->
  <!-- Catches Firefox + Samsung Browser + any browser that ignores the meta tags -->
  <script>
    (function() {
      // Immediately set translate=no on the root element
      document.documentElement.setAttribute('translate', 'no');
      document.documentElement.setAttribute('class',
        (document.documentElement.getAttribute('class') || '') + ' notranslate'
      );

      // Watch for Google Translate / Bing Translate DOM injections and undo them
      var observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(m) {
          // Google Translate adds a <font> wrapper and changes html.translated-ltr
          if (document.documentElement.classList.contains('translated-ltr') ||
              document.documentElement.classList.contains('translated-rtl')) {
            // Re-affirm no-translate; page reload is the nuclear option but too jarring
            document.documentElement.removeAttribute('class');
            document.documentElement.setAttribute('translate', 'no');
            document.documentElement.setAttribute('class', 'notranslate');
          }
        });
      });

      observer.observe(document.documentElement, {
        attributes: true,
        attributeFilter: ['class', 'lang']
      });
    })();
  </script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => console.log('Rocket SW registered'))
          .catch(err => console.log('Rocket SW failed', err));
      });
    }
  </script>
</head>

<body class="notranslate" translate="no">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
